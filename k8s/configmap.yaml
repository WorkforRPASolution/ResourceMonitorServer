apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-monitor-config
  labels:
    app: resource-monitor-server
data:
  # ----- Elasticsearch (운영 7.11.x) -----
  # ⚠️ RMS(ears-rtm)와 다른 ns(ears-base) → 짧은 이름 불가, FQDN(.<ns>.svc.cluster.local) 필수.
  MONITOR_ES_HOSTS: "http://rtm-elasticsearch-coordinating-only.ears-base.svc.cluster.local:9200"
  MONITOR_ES_USERNAME: "elastic"
  MONITOR_ES_USE_SSL: "false"
  MONITOR_ES_REQUEST_TIMEOUT: "30"
  MONITOR_ES_MAX_RETRIES: "3"

  # ----- MongoDB (EARS DB) -----
  # URI는 Secret에서 주입 (자격증명 포함)
  MONITOR_MONGO_DB: "EARS"

  # ----- Zookeeper 3.5.5 -----
  # ⚠️ StatefulSet per-pod DNS 는 *헤드리스* 서비스(zookeeper-headless)에서만 나온다.
  #     NodePort/ClusterIP 서비스(zookeeper)로는 zookeeper-0.zookeeper... 가 NXDOMAIN.
  #     형식: <파드명>.<헤드리스서비스명>.<ns>.svc.cluster.local:2181
  MONITOR_ZK_HOSTS: "zookeeper-0.zookeeper-headless.ears-base.svc.cluster.local:2181,zookeeper-1.zookeeper-headless.ears-base.svc.cluster.local:2181,zookeeper-2.zookeeper-headless.ears-base.svc.cluster.local:2181"
  MONITOR_ZK_ROOT_PATH: "/resource-monitor"
  MONITOR_ZK_SESSION_TIMEOUT: "30"
  # SASL 미사용 시 빈 값 (Secret이 빈 mechanism을 주입)

  # ----- Redis 5.0.6 -----
  # DB 격리: 0=WebManager / 5=ResourceMonitorServer(이 서비스) / 10=agent / 15=테스트
  # prefix 'RESOURCE_ALERT:' 는 belt-and-suspenders 이중 가드
  MONITOR_REDIS_KEY_PREFIX: "RESOURCE_ALERT"
  # (A) HA / Sentinel 모드 (운영 기본) — announce 파드 sentinel(26379) 목록 + master 그룹명.
  #     ⚠️ DB 는 URL 의 /N 이 아니라 MONITOR_REDIS_DB 로 지정한다(RMS 예약=5).
  #     센티널에 requirepass 가 있으면 secret 의 MONITOR_REDIS_SENTINEL_PASSWORD 로 지정.
  #     비우면 센티널엔 AUTH 미전송(데이터 비번으로 폴백 안 함 — sentinel.auth=false 대응).
  MONITOR_REDIS_SENTINELS: "mdb-redis-ha-announce-0.ears-base.svc.cluster.local:26379,mdb-redis-ha-announce-1.ears-base.svc.cluster.local:26379,mdb-redis-ha-announce-2.ears-base.svc.cluster.local:26379"
  MONITOR_REDIS_SENTINEL_MASTER: "mymaster"
  MONITOR_REDIS_DB: "5"
  # (B) 단일 Redis(비-HA) — 위 Sentinel 키를 비우고 이 URL 만 쓴다. DB 는 URL 끝의 /5.
  # MONITOR_REDIS_URL: "redis://redis.cache:6379/5"

  # ----- Email API (Akka HttpWebServer) -----
  # 같은 ns(ears-rtm)라 짧은 이름. ⚠️ 포트는 *Service* 포트(80)다 — 컨테이너 포트(8080) 아님
  #     (kubectl get svc 의 PORT(S) 가 "80:50004/TCP" → 80 을 쓴다).
  MONITOR_EMAIL_API_URL: "http://http-web-server:80/EmailNotify"
  MONITOR_EMAIL_API_TIMEOUT: "10"

  # ----- Grafana (alert body 링크용) -----
  MONITOR_GRAFANA_BASE_URL: "https://grafana.factory.local"
  MONITOR_GRAFANA_DASHBOARD_UID: ""

  # ----- Scheduler / instance -----
  MONITOR_SCHEDULER_MISFIRE_GRACE_TIME: "60"
  MONITOR_LOCAL_TZ: "Asia/Seoul"

  # ----- Logging -----
  MONITOR_LOG_LEVEL: "INFO"
  MONITOR_LOG_FORMAT: "console"

  # ----------------------------------------------------------------------
  # ⚠️ DO NOT SET MONITOR_DEBUG_READ_ONLY IN PRODUCTION
  #
  # MONITOR_DEBUG_READ_ONLY=true causes the service to skip:
  #   - init_repos create_collection + create_index (빈 컬렉션도 안 만듦)
  #   - init_distributed (ZK 참여 없음)
  #   - leader_election, partition_manager
  #   - email send_alert (로그만)
  #   - Redis cooldown writes
  # Scheduler still starts, BUT with no distributed coordination — which
  # means analysis jobs run without leader/partition, potentially zero
  # processes are analyzed, and a blind-spot develops. This flag is for
  # developer debugging only. See ARCHITECTURE.md §9 / CONTRIBUTING.md §8.4
  # for full details.
  #
  # There must be NO MONITOR_DEBUG_READ_ONLY key in this ConfigMap.
  # ----------------------------------------------------------------------
